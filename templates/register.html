{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Register</h1>
<div class="card">
  <form method="post">
    <div>
      <label>Email</label><br>
      <input type="email" name="email" required>
    </div>
    <div>
      <label>Password</label><br>
      <input type="password" name="password" required>
    </div>
    <button type="submit">Create Account</button>
  </form>
</div>
{% endblock %}
